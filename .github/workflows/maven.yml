name: Resful Booking CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run Automation Tests
        run: mvn test
      - name: Upload Surefire Report
        uses: actions/upload-artifact@v4
        if: always() #ensure the report uploads regardless the test result
        with:
          name: booker-api-surefile-report
          path: "target/surefire-reports/"