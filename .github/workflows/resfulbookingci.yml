name: Resful Booking CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run Automation Tests
        run: mvn test
      - name: Upload Surefire Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: booker-api-surefire-report
          path: target/surefire-reports/

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: booker-api-allure-report
          path: allure-results

      - name: Deploy allure report to Github Page
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          publish_branch: main
          publish_dir: allure-history